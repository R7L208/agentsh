name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show compiler version
        run: cc --version

      - name: Build (agentsh + broker)
        run: make

      - name: Run tests
        run: make test

      - name: Run end-to-end demo
        run: make demo
